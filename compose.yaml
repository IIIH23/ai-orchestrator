services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/iiih23/ai-orchestrator:${IMAGE_TAG:-staging}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64M,mode=1777
    environment:
      ORCHESTRATOR_ENV: ${ORCHESTRATOR_ENV:-staging}
      ORCHESTRATOR_PORT: "8080"
    ports:
      - "${ORCHESTRATOR_BIND_ADDRESS:-127.0.0.1}:${ORCHESTRATOR_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "python", "-m", "orchestrator_api.healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
