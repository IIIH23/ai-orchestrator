name: Linear Sync

on:
  workflow_dispatch:

jobs:
  linear-sync:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync Linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_PROJECT_ID: ${{ secrets.LINEAR_PROJECT_ID }}
        run: python3 tools/linear_sync.py --project-id "$LINEAR_PROJECT_ID"
