# Tool Registry
# MCP-style tool definitions, access levels, and approval gates.

tools:
  - id: github
    name: GitHub MCP / REST API
    mcp_server: github
    capabilities:
      - repo_read
      - workflow_read
      - workflow_log_read
      - issue_read
      - pr_read
      - branch_read
      - commit_read
      - artifact_read
      - workflow_dispatch
    read_access: true
    write_access: true
    secret_access: true
    risk_level: medium
    healthcheck: "curl -s -o /dev/null -w '%{http_code}' https://api.github.com/zen"
    approval_note: "Secret changes, protected branches, PR merge, and workflow dispatch with side effects need owner approval."

  - id: linear
    name: Linear MCP / GraphQL API
    mcp_server: linear
    capabilities:
      - issue_read
      - issue_create
      - issue_update
      - project_read
      - team_read
      - label_read
      - initiative_read
    read_access: true
    write_access: true
    secret_access: true
    risk_level: medium
    healthcheck: "echo requires_LINEAR_API_KEY"
    approval_note: "Writes require scoped token and evidence from Linear after execution."

  - id: obsidian
    name: Obsidian Vault Filesystem MCP
    mcp_server: filesystem
    capabilities:
      - note_read
      - note_write
      - note_index
      - backlink_context
      - sync_status
    read_access: true
    write_access: true
    secret_access: false
    risk_level: low
    healthcheck: "test -d docs/obsidian"

  - id: filesystem
    name: Repository Filesystem MCP
    mcp_server: filesystem
    capabilities:
      - file_read
      - file_write
      - search
      - patch
      - artifact_write
    read_access: true
    write_access: true
    secret_access: false
    risk_level: low
    healthcheck: "test -d tools && test -d docs"

  - id: shell
    name: Local Shell MCP
    mcp_server: shell
    capabilities:
      - command_execution
      - test_execution
      - git_local
      - health_checks
    read_access: true
    write_access: true
    secret_access: false
    risk_level: medium
    healthcheck: "python3 --version"
    approval_note: "Destructive commands, production actions, and secret-touching commands require approval."

  - id: telegram
    name: Telegram Bot API MCP
    mcp_server: telegram
    capabilities:
      - message_send
      - chat_read
      - delivery_validation
    read_access: true
    write_access: true
    secret_access: true
    risk_level: low
    healthcheck: "echo requires_TELEGRAM_BOT_TOKEN"
    approval_note: "External messaging outside this chat requires explicit target approval."

  - id: cloudflare
    name: Cloudflare API MCP
    mcp_server: cloudflare
    capabilities:
      - zone_read
      - dns_record_read
      - dns_record_create
      - dns_record_update
      - dns_record_delete
    read_access: true
    write_access: true
    secret_access: true
    risk_level: high
    healthcheck: "echo requires_CF_API_TOKEN"
    approval_note: "DNS mutation requires exact owner approval and rollback record."

  - id: hetzner
    name: Hetzner Cloud API MCP
    mcp_server: hetzner
    capabilities:
      - server_read
      - firewall_read
      - server_create
      - server_resize
      - server_delete
      - paid_resource_management
    read_access: true
    write_access: true
    secret_access: true
    risk_level: high
    healthcheck: "echo requires_HCLOUD_TOKEN"
    approval_note: "Any paid-resource mutation requires owner approval for exact operation and cost."
