# Agent Registry
# Defines autonomous orchestration roles, capabilities, model/delegation routes, and approval boundaries.

agents:
  - id: planner
    name: Planner
    type: planning
    role: planner
    capabilities:
      - task_decomposition
      - risk_classification
      - acceptance_criteria
      - dependency_mapping
      - owner_approval_requests
    risk_level: low
    auth_method: none
    cost_class: standard
    available: true
    healthcheck: "echo ok"
    timeout: 60
    fallback: hermes
    allowed_actions:
      - read_project_context
      - create_plans
      - route_tasks
    forbidden_actions:
      - modify_secrets
      - production_deploy
      - paid_resource_creation

  - id: devops
    name: DevOps
    type: infrastructure
    role: devops
    capabilities:
      - ci_cd_config
      - github_actions_diagnostics
      - staging_health_checks
      - rollback_plans
      - cloud_plan_review
    risk_level: medium
    auth_method: ssh_key_or_api_token
    cost_class: standard
    available: true
    healthcheck: "python3 tools/verify_github.py --help >/dev/null 2>&1 || true"
    timeout: 300
    fallback: hermes
    allowed_actions:
      - read_logs
      - inspect_ci
      - create_reversible_local_changes
      - staging_read_checks
    forbidden_actions:
      - production_deploy
      - dns_changes
      - firewall_changes
      - hetzner_resource_mutation
      - modify_secrets

  - id: coder_codex
    name: Coder / Codex
    type: coding
    role: coder
    capabilities:
      - code_implementation
      - refactoring
      - debugging
      - test_creation
      - repair_patches
    risk_level: low
    auth_method: openai_oauth
    cost_class: paid
    available: true
    healthcheck: "codex --version"
    timeout: 600
    fallback: hermes
    allowed_actions:
      - code_editing
      - file_creation
      - test_execution
      - feature_branch_commits
      - draft_pr_creation
    forbidden_actions:
      - push_to_main
      - modify_secrets
      - production_deploy
      - paid_resource_creation

  - id: reviewer_claude
    name: Reviewer / Claude
    type: reviewer
    role: reviewer
    capabilities:
      - architecture_review
      - security_review
      - threat_modeling
      - migration_strategy_review
      - independent_verdict
    risk_level: medium
    auth_method: anthropic_oauth
    cost_class: paid
    available: false
    healthcheck: "claude --version"
    timeout: 600
    fallback: hermes
    allowed_actions:
      - read_files
      - create_review_artifacts
      - provide_verdict
    forbidden_actions:
      - code_editing
      - git_operations
      - modify_secrets
      - production_deploy

  - id: rag_librarian
    name: RAG Librarian
    type: memory
    role: rag_librarian
    capabilities:
      - obsidian_indexing
      - github_repo_indexing
      - linear_context_indexing
      - github_actions_log_indexing
      - hermes_log_indexing
      - citation_lookup
    risk_level: low
    auth_method: filesystem_and_read_only_apis
    cost_class: standard
    available: true
    healthcheck: "test -d docs"
    timeout: 300
    fallback: hermes
    allowed_actions:
      - read_notes
      - read_repo
      - read_logs
      - produce_citations
    forbidden_actions:
      - expose_secrets
      - modify_owner_vault_without_approval
      - write_external_systems

  - id: verifier
    name: Verifier
    type: verification
    role: verifier
    capabilities:
      - evidence_collection
      - external_side_effect_checks
      - ci_log_validation
      - telegram_delivery_validation
      - linear_issue_validation
      - verification_state_updates
    risk_level: low
    auth_method: read_only_or_scoped_tokens
    cost_class: standard
    available: true
    healthcheck: "python3 tools/verification_state.py show >/dev/null 2>&1 || true"
    timeout: 300
    fallback: hermes
    allowed_actions:
      - run_read_only_checks
      - record_evidence
      - block_completion_without_evidence
    forbidden_actions:
      - mark_complete_without_evidence
      - modify_secrets
      - production_deploy

  - id: budget_model_router
    name: Budget / Model Router
    type: routing
    role: budget_model_router
    capabilities:
      - rate_limit_detection
      - model_fallback_selection
      - free_model_avoidance_after_429
      - codex_delegation_for_code
      - claude_delegation_for_review
      - cost_guardrails
    risk_level: low
    auth_method: none
    cost_class: standard
    available: true
    healthcheck: "python3 tools/model_router.py '{\"candidates\":[]}' >/dev/null"
    timeout: 60
    fallback: hermes
    allowed_actions:
      - choose_model
      - route_to_agent
      - redact_diagnostics
    forbidden_actions:
      - print_api_keys
      - enable_premium_without_policy
      - bypass_owner_approval

  - id: hermes
    name: Hermes (Default Orchestrator)
    type: primary
    role: orchestrator
    capabilities:
      - planning
      - task_routing
      - risk_classification
      - evidence_design
      - aggregation
      - owner_communication
      - context_management
    risk_level: low
    auth_method: ssh_key
    cost_class: standard
    available: true
    healthcheck: "echo ok"
    timeout: 30
    fallback: null
    allowed_actions:
      - read_files
      - git_operations_local
      - run_tests
      - create_docs
      - call_codex
      - call_claude_code
      - verify_external_systems
    forbidden_actions:
      - modify_secrets
      - production_deploy
      - dns_changes
      - firewall_changes
      - paid_resource_creation
      - credential_rotation
