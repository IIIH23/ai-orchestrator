version: "3.9"

services:
  app:
    build: .
    image: ghcr.io/IIIH23/earth-pulse-poc/earthbit-health:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
